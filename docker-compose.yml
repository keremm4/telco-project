version: '3.8'

services:
  oracle-xe:
    image: gvenzl/oracle-xe:21-slim
    container_name: telco-oracle-xe
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: password123
      APP_USER: telco_user
      APP_USER_PASSWORD: telco123
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./init:/container-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

volumes:
  oracle-data:
